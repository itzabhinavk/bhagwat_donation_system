<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Bhagwat System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon" style="width:60px;height:60px;margin:0 auto 12px;font-size:28px;">🔐</div>
      <h1>Admin Login</h1>
      <p>Bhagwat Donation System</p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" style="margin-bottom: 16px;">
            {{ '⚠️' if category == 'error' else '✅' }} {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login Form -->
    <form method="POST" action="{{ url_for('admin.login') }}">
      <div class="form-group mb-2">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter admin username"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary w-100" style="justify-content:center;">
        🔓 Login to Admin Panel
      </button>
    </form>

    <div class="mt-2 text-center">
      <a href="{{ url_for('public.index') }}" class="text-muted" style="font-size: 0.82rem;">
        ← Back to Public Site
      </a>
    </div>

  </div>
</div>

<script>
  // Auto-dismiss alerts
  document.querySelectorAll('.alert').forEach(el => {
    setTimeout(() => {
      el.style.transition = 'all 0.4s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 400);
    }, 4000);
  });
</script>
</body>
</html>
